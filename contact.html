    <main class="page-shell contact-page">
      <section class="contact-section contact-page-section" aria-labelledby="contact-title">
        <div class="contact-intro">
          <p>联系我</p>
          <h1 id="contact-title">有想法，直接发给我</h1>
          <span>欢迎反馈体验问题、课程合作、内容建议，或者告诉我你希望孩子先学哪一块。</span>
          <a class="primary-email" href="mailto:kevin_time_space@163.com">
            <small>邮箱</small>
            <strong>kevin_time_space@163.com</strong>
          </a>
          <div class="contact-methods compact" aria-label="联系方式">
            <span>深圳 · 青少年 AI 科学学习</span>
          </div>
        </div>
        <form class="contact-form" id="contactForm">
          <label>
            <span>你的称呼</span>
            <input name="name" type="text" autocomplete="name" placeholder="家长 / 老师 / 同学" />
          </label>
          <label>
            <span>联系方式</span>
            <input name="contact" type="text" autocomplete="email" placeholder="邮箱、手机号或微信" />
          </label>
          <label>
            <span>想说的话</span>
            <textarea name="message" rows="4" placeholder="比如：希望增加某个知识点、想合作课程、发现了页面问题"></textarea>
          </label>
          <button type="submit">发送留言</button>
          <p class="contact-message" id="contactMessage">当前为本地演示，留言会先在页面确认，后续接入后端保存。</p>
        </form>
      </section>
    </main>
