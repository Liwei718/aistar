<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin's Olympic — Football Match</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bungee&family=Righteous&family=Anybody:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1a0a;overflow:hidden;height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;font-family:'Anybody',sans-serif;user-select:none}
#wrap{position:relative;width:100%;max-width:960px;aspect-ratio:16/10}
canvas{width:100%;height:100%;display:block;border-radius:6px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,8,0,0.95);border-radius:6px;z-index:10;transition:opacity 0.5s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-family:'Bungee Shade',sans-serif;font-size:clamp(18px,4vw,40px);background:linear-gradient(135deg,#44ff66,#00cc44,#ffdd00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px;letter-spacing:2px}
#overlay .sub{color:#5a8a5a;font-size:clamp(9px,1.4vw,12px);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
.emoji-row{font-size:clamp(24px,4.5vw,46px);margin:4px 0 8px;letter-spacing:6px}
#overlay button{font-family:'Bungee',sans-serif;font-size:clamp(11px,1.8vw,16px);padding:12px 32px;border:none;border-radius:6px;cursor:pointer;color:#fff;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#228b22,#1a6b1a);box-shadow:0 0 20px rgba(34,139,34,0.3);transition:all 0.2s;margin:6px}
#overlay button:hover{transform:scale(1.06);box-shadow:0 0 30px rgba(34,180,34,0.5)}
#result-msg{font-family:'Bungee',sans-serif;font-size:clamp(12px,2.2vw,20px);color:#ffdd00;text-shadow:0 0 10px #ffdd0066;text-align:center;margin-bottom:10px;line-height:1.5}
#match-card{background:linear-gradient(135deg,#0a200a,#143014);border:2px solid #33aa3344;border-radius:8px;padding:12px 20px;margin:8px 0;text-align:center;max-width:340px}
#match-card .vs{font-family:'Bungee',sans-serif;color:#fff;font-size:clamp(20px,3.5vw,32px);margin:6px 0;display:flex;align-items:center;justify-content:center;gap:12px}
#match-card .desc{color:#5a9a5a;font-size:clamp(9px,1.2vw,11px);letter-spacing:1px;margin-top:4px}
#hud{position:absolute;top:0;left:0;right:0;padding:6px 14px;z-index:5;pointer-events:none;display:flex;justify-content:space-between;align-items:center}
.hud-team{font-family:'Bungee',sans-serif;font-size:clamp(14px,2.5vw,24px);letter-spacing:1px}
.hud-team.blue{color:#44aaff;text-shadow:0 0 8px #0088ff44}
.hud-team.red{color:#ff5544;text-shadow:0 0 8px #ff440044}
#hud-center{text-align:center}
#hud-time{font-family:'Bungee',sans-serif;color:#ffcc00;font-size:clamp(12px,2vw,18px);text-shadow:0 0 8px #ffcc0044}
#hud-half{font-family:'Anybody',sans-serif;color:#88bb88;font-size:clamp(8px,1vw,10px)}
#commentary{position:absolute;bottom:28px;left:0;right:0;text-align:center;z-index:6;pointer-events:none}
#commentary-msg{font-family:'Righteous',sans-serif;font-size:clamp(10px,1.5vw,14px);color:#44ffaa;text-shadow:0 0 8px #00ff6644;opacity:0;transition:opacity 0.3s;letter-spacing:1px}
#controls{position:absolute;bottom:6px;left:0;right:0;text-align:center;color:#2a4a2a;font-size:clamp(8px,1.1vw,10px);letter-spacing:1px;z-index:5;pointer-events:none}
#goal-flash{position:absolute;inset:0;pointer-events:none;z-index:7;opacity:0;transition:opacity 0.15s;border-radius:6px}
.site-back{position:fixed;top:14px;left:14px;z-index:30;min-height:36px;padding:8px 12px;border:1px solid rgba(255,255,255,.24);border-radius:6px;background:rgba(0,0,0,.52);color:#fff;text-decoration:none;font:700 13px Arial,sans-serif;letter-spacing:1px;backdrop-filter:blur(8px)}
.site-back:hover{background:rgba(34,139,34,.72)}
</style>
</head>
<body>
<a class="site-back" href="../../games.html">← 返回小游戏</a>
<div id="wrap">
<canvas id="c"></canvas>
<div id="goal-flash"></div>
<div id="hud">
  <div class="hud-team blue">🏅 KEVIN <span id="s-k">0</span></div>
  <div id="hud-center"><div id="hud-time">0:00</div><div id="hud-half">1ST HALF</div></div>
  <div class="hud-team red"><span id="s-o">0</span> <span id="opp-hud">BRA</span> 🏴</div>
</div>
<div id="commentary"><div id="commentary-msg"></div></div>
<div id="overlay">
  <div class="emoji-row">⚽🏟️🏅</div>
  <h1>KEVIN'S OLYMPIC</h1>
  <div class="sub">Football Championship</div>
  <div id="match-card">
    <div class="vs">
      <span style="color:#44aaff">KEVIN</span>
      <span style="color:#888;font-size:0.6em">VS</span>
      <span id="opp-card" style="color:#ff5544">BRAZIL 🇧🇷</span>
    </div>
    <div class="desc">5v5 • 2 minute halves • Win to advance!</div>
  </div>
  <div id="result-msg" style="display:none"></div>
  <button id="startBtn">KICK OFF</button>
</div>
<div id="controls">WASD/Arrows = Move &nbsp;| Z = Pass &nbsp;| X = Shoot &nbsp;| C = Switch &nbsp;| Shift = Sprint &nbsp;| Touch = Joystick+Buttons</div>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const FW=960,FH=600;C.width=FW;C.height=FH;
const overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn');
const resultMsg=document.getElementById('result-msg');
const sKE=document.getElementById('s-k'),sOE=document.getElementById('s-o');
const hudTime=document.getElementById('hud-time'),hudHalf=document.getElementById('hud-half');
const oppHud=document.getElementById('opp-hud'),oppCard=document.getElementById('opp-card');
const commentaryMsg=document.getElementById('commentary-msg');
const goalFlash=document.getElementById('goal-flash');

// Field
const PITCH={x:40,y:50,w:FW-80,h:FH-90};
const GOAL_W=100,GOAL_H=8;
const GOAL_DEPTH=20;
// Goals at top and bottom center
const GOAL_TOP={x:PITCH.x+PITCH.w/2-GOAL_W/2,y:PITCH.y-GOAL_DEPTH,w:GOAL_W,h:GOAL_DEPTH+GOAL_H};
const GOAL_BOT={x:PITCH.x+PITCH.w/2-GOAL_W/2,y:PITCH.y+PITCH.h-GOAL_H,w:GOAL_W,h:GOAL_DEPTH+GOAL_H};

const OPPONENTS=[
  {name:'BRAZIL',short:'BRA',emoji:'🇧🇷',color:'#ffdd00',spd:2.2,shoot:0.012,pass:0.7},
  {name:'GERMANY',short:'GER',emoji:'🇩🇪',color:'#dd0000',spd:2.5,shoot:0.015,pass:0.75},
  {name:'ARGENTINA',short:'ARG',emoji:'🇦🇷',color:'#66bbff',spd:2.7,shoot:0.018,pass:0.8},
  {name:'FRANCE',short:'FRA',emoji:'🇫🇷',color:'#0044cc',spd:3.0,shoot:0.022,pass:0.85},
  {name:'JAPAN',short:'JPN',emoji:'🇯🇵',color:'#dd0044',spd:3.2,shoot:0.025,pass:0.9},
];

let matchIdx=0,running=false,frame=0;
let gameTime=0,halfLength=120,half=1; // seconds
let scoreK=0,scoreO=0;
let goalCooldown=0;

// Players
let teamK=[],teamO=[];
let ball={x:FW/2,y:FH/2,vx:0,vy:0,owner:null,free:true,z:0,vz:0};
let controlled=null; // player being controlled
let keys_={};
let particles=[];
let announcements=[];
let screenShake={x:0,y:0,i:0};

// Touch controls
let touchJoy={active:false,sx:0,sy:0,dx:0,dy:0};
let touchBtns={pass:false,shoot:false,sprint:false,switchP:false};

// Formation positions (relative 0-1 on pitch)
const FORM_K=[ // attacking down (goal at top)
  {x:0.5,y:0.08,role:'gk'},
  {x:0.25,y:0.3,role:'def'},
  {x:0.75,y:0.3,role:'def'},
  {x:0.4,y:0.55,role:'mid'},
  {x:0.6,y:0.75,role:'fwd'},
];
const FORM_O=[ // attacking up (goal at bottom)
  {x:0.5,y:0.92,role:'gk'},
  {x:0.25,y:0.7,role:'def'},
  {x:0.75,y:0.7,role:'def'},
  {x:0.4,y:0.45,role:'mid'},
  {x:0.6,y:0.25,role:'fwd'},
];

function worldX(pct){return PITCH.x+PITCH.w*pct;}
function worldY(pct){return PITCH.y+PITCH.h*pct;}

function initMatch(){
  const opp=OPPONENTS[matchIdx];
  scoreK=0;scoreO=0;half=1;gameTime=0;goalCooldown=0;
  sKE.textContent='0';sOE.textContent='0';
  hudHalf.textContent='1ST HALF';
  oppHud.textContent=opp.short;
  oppCard.textContent=opp.name+' '+opp.emoji;
  particles=[];announcements=[];

  teamK=FORM_K.map((f,i)=>({
    x:worldX(f.x),y:worldY(f.y),
    homeX:f.x,homeY:f.y,
    vx:0,vy:0,
    role:f.role,team:'k',
    speed:f.role==='gk'?2.5:3.2,
    radius:8,
    kickCooldown:0,
    name:i===0?'Kevin':['Alex','Rio','Sam','Max'][i-1],
    isKevin:i===0?false:false, // Kevin is controlled player
    number:i+1,
  }));
  // Kevin is the forward (#5)
  teamK[4].isKevin=true;teamK[4].name='Kevin';teamK[4].number=10;
  controlled=teamK[4];

  teamO=FORM_O.map((f,i)=>({
    x:worldX(f.x),y:worldY(f.y),
    homeX:f.x,homeY:f.y,
    vx:0,vy:0,
    role:f.role,team:'o',
    speed:opp.spd+(f.role==='fwd'?0.3:0),
    radius:8,
    kickCooldown:0,
    name:['GK','Def1','Def2','Mid','Fwd'][i],
    number:i+1,
  }));

  resetPositions(1);
  ball.owner=null;ball.free=true;
  ball.x=FW/2;ball.y=FH/2;ball.vx=0;ball.vy=0;ball.z=0;ball.vz=0;
}

function resetPositions(kickoffTeam){
  const flip=half===2?-1:1;
  teamK.forEach((p,i)=>{
    const f=FORM_K[i];
    p.x=worldX(f.x);
    p.y=worldY(half===1?f.y:1-f.y);
    p.vx=0;p.vy=0;
  });
  teamO.forEach((p,i)=>{
    const f=FORM_O[i];
    p.x=worldX(f.x);
    p.y=worldY(half===1?f.y:1-f.y);
    p.vx=0;p.vy=0;
  });
  ball.x=FW/2;ball.y=FH/2;ball.vx=0;ball.vy=0;ball.z=0;ball.vz=0;
  ball.owner=null;ball.free=true;
}

function allPlayers(){return[...teamK,...teamO];}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function closest(team,pos){
  let best=null,bestD=Infinity;
  team.forEach(p=>{const d=dist(p,pos);if(d<bestD){bestD=d;best=p;}});
  return best;
}

function commentary(msg){
  commentaryMsg.textContent='📢 '+msg;commentaryMsg.style.opacity='1';
  clearTimeout(commentary._t);commentary._t=setTimeout(()=>commentaryMsg.style.opacity='0',2200);
}
function announce(text,color,size){announcements.push({text,color,y:FH/2-30,alpha:2,scale:(size||1)*1.5});}
function emitP(x,y,color,n,spd,sz){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=Math.random()*spd+0.5;particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1,color,size:Math.random()*sz+0.5,decay:0.02+Math.random()*0.02});}}

// ======== UPDATE ========
function update(){
  if(!running)return;
  frame++;

  // Time
  gameTime+=1/60;
  const mins=Math.floor(gameTime/60);
  const secs=Math.floor(gameTime%60);
  hudTime.textContent=`${mins}:${secs.toString().padStart(2,'0')}`;

  if(gameTime>=halfLength){
    if(half===1){
      half=2;gameTime=0;
      hudHalf.textContent='2ND HALF';
      resetPositions(2);
      commentary("Second half begins!");
      announce('2ND HALF','#ffcc00',0.8);
    }else{
      endMatch();return;
    }
  }

  if(goalCooldown>0){goalCooldown--;if(goalCooldown===1)resetPositions(1);return;}

  updateControlled();
  updateAITeam(teamK,teamO,false);
  updateAITeam(teamO,teamK,true);
  updateBall();
  checkGoals();

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);
  announcements.forEach(a=>{a.y-=1.2;a.alpha-=0.018;a.scale+=0.003;});
  announcements=announcements.filter(a=>a.alpha>0);

  // Shake
  if(screenShake.i>0){screenShake.x=(Math.random()-0.5)*screenShake.i;screenShake.y=(Math.random()-0.5)*screenShake.i;screenShake.i*=0.85;if(screenShake.i<0.3)screenShake.i=0;}else{screenShake.x=0;screenShake.y=0;}
}

function updateControlled(){
  const p=controlled;if(!p)return;
  let dx=0,dy=0;
  if(keys_['w']||keys_['arrowup'])dy=-1;
  if(keys_['s']||keys_['arrowdown'])dy=1;
  if(keys_['a']||keys_['arrowleft'])dx=-1;
  if(keys_['d']||keys_['arrowright'])dx=1;
  if(touchJoy.active){dx=touchJoy.dx;dy=touchJoy.dy;}

  const sprint=(keys_['shift']||touchBtns.sprint)?1.5:1;
  const spd=p.speed*sprint;
  if(dx||dy){
    const len=Math.hypot(dx,dy);
    p.vx=dx/len*spd;p.vy=dy/len*spd;
  }else{p.vx*=0.7;p.vy*=0.7;}

  p.x+=p.vx;p.y+=p.vy;
  clampToPitch(p);
  p.kickCooldown=Math.max(0,p.kickCooldown-1);

  // Auto-pickup ball
  if(ball.free&&dist(p,ball)<p.radius+8&&p.kickCooldown===0){
    ball.owner=p;ball.free=false;
  }

  // Pass (Z)
  if((keys_['z']||touchBtns.pass)&&ball.owner===p&&p.kickCooldown===0){
    keys_['z']=false;touchBtns.pass=false;
    const target=findPassTarget(p,teamK);
    if(target){
      passBall(p,target);
      commentary(p.name+" passes to "+target.name+"!");
    }
  }

  // Shoot (X)
  if((keys_['x']||touchBtns.shoot)&&ball.owner===p&&p.kickCooldown===0){
    keys_['x']=false;touchBtns.shoot=false;
    const goalTarget=half===1?{x:FW/2,y:PITCH.y+PITCH.h+5}:{x:FW/2,y:PITCH.y-5};
    shootBall(p,goalTarget,8+Math.random()*3);
    commentary(p.name+" shoots!");
    emitP(p.x,p.y,'#ffdd00',10,3,2);
  }

  // Switch (C)
  if((keys_['c']||touchBtns.switchP)){
    keys_['c']=false;touchBtns.switchP=false;
    switchPlayer();
  }
}

function switchPlayer(){
  // Find closest teammate to ball who isn't current
  let best=null,bestD=Infinity;
  teamK.forEach(p=>{
    if(p===controlled)return;
    const d=dist(p,ball);
    if(d<bestD){bestD=d;best=p;}
  });
  if(best)controlled=best;
}

function findPassTarget(from,team){
  let best=null,bestScore=-Infinity;
  team.forEach(t=>{
    if(t===from)return;
    const d=dist(from,t);
    if(d<30||d>400)return;
    // Prefer forward passes
    const fwd=half===1?(t.y-from.y):(from.y-t.y);
    const score=fwd*0.5-d*0.3;
    if(score>bestScore){bestScore=score;best=t;}
  });
  return best||team.find(t=>t!==from);
}

function passBall(from,to){
  ball.owner=null;ball.free=true;
  const dx=to.x-from.x,dy=to.y-from.y;
  const d=Math.hypot(dx,dy);
  const spd=5+d*0.008;
  ball.vx=dx/d*spd;ball.vy=dy/d*spd;
  ball.x=from.x+dx/d*12;ball.y=from.y+dy/d*12;
  from.kickCooldown=15;
  ball.z=0;ball.vz=1;
}

function shootBall(from,target,power){
  ball.owner=null;ball.free=true;
  const dx=target.x-from.x,dy=target.y-from.y;
  const d=Math.hypot(dx,dy);
  ball.vx=dx/d*power+(Math.random()-0.5)*1.5;
  ball.vy=dy/d*power+(Math.random()-0.5)*1;
  ball.x=from.x+dx/d*12;ball.y=from.y+dy/d*12;
  from.kickCooldown=20;
  ball.z=0;ball.vz=2;
  screenShake.i=5;
}

function updateAITeam(team,opponents,isOpp){
  const opp=OPPONENTS[matchIdx];
  const teamTag=isOpp?'o':'k';
  const atkDir=isOpp?(half===1?-1:1):(half===1?1:-1); // +1=down, -1=up
  const goalY=atkDir===1?PITCH.y+PITCH.h+5:PITCH.y-5;
  const defGoalY=atkDir===1?PITCH.y-5:PITCH.y+PITCH.h+5;

  team.forEach(p=>{
    if(p===controlled)return;
    p.kickCooldown=Math.max(0,p.kickCooldown-1);

    const hx=worldX(p.homeX);
    const hy=worldY(half===1?p.homeY:1-p.homeY);
    const ballDist=dist(p,ball);
    const myTeamHasBall=ball.owner&&ball.owner.team===teamTag;
    const enemyHasBall=ball.owner&&ball.owner.team!==teamTag;
    const nobodyHasBall=!ball.owner||ball.free;

    // ---- AI WITH BALL ----
    if(ball.owner===p){
      const goalX=FW/2;
      const toGoal=Math.hypot(goalX-p.x,goalY-p.y);

      // Check for nearby enemies pressing
      let pressured=false;
      opponents.forEach(e=>{if(dist(p,e)<60)pressured=true;});

      // Shoot if close enough
      if(toGoal<200&&Math.random()<(isOpp?opp.shoot:0.02)&&p.kickCooldown===0){
        shootBall(p,{x:goalX+(Math.random()-0.5)*70,y:goalY},7+Math.random()*3);
        if(isOpp)commentary(p.name+" shoots for "+opp.short+"!");
        else commentary(p.name+" takes a shot!");
      }
      // Pass if pressured or randomly
      else if((pressured&&Math.random()<0.06||Math.random()<0.015)&&p.kickCooldown===0){
        const target=findPassTarget(p,team);
        if(target){
          passBall(p,target);
          if(!isOpp)commentary(p.name+" passes to "+target.name);
        }
      }
      // Dribble toward goal — with some sideways movement to avoid defenders
      else{
        let dribX=goalX,dribY=goalY;
        // Dodge nearest opponent
        let nearestEnemy=null,neDist=Infinity;
        opponents.forEach(e=>{const d2=dist(p,e);if(d2<neDist){neDist=d2;nearestEnemy=e;}});
        if(nearestEnemy&&neDist<80){
          // Sidestep away from defender
          const sideDir=nearestEnemy.x>p.x?-1:1;
          dribX=p.x+sideDir*60;
        }
        const dx=dribX-p.x,dy=dribY-p.y;
        const d=Math.hypot(dx,dy)||1;
        p.vx=dx/d*p.speed*0.9;p.vy=dy/d*p.speed*0.9;
      }
    }
    // ---- AI WITHOUT BALL ----
    else{
      let tx=hx,ty=hy,moveSpd=p.speed;

      // === GK BEHAVIOR ===
      if(p.role==='gk'){
        const gkHomeY=atkDir===1?PITCH.y+20:PITCH.y+PITCH.h-20;
        tx=Math.max(PITCH.x+PITCH.w/2-80,Math.min(PITCH.x+PITCH.w/2+80,ball.x));
        ty=gkHomeY;
        // Rush out if ball is very close to goal
        if(Math.abs(ball.y-gkHomeY)<120&&Math.abs(ball.x-FW/2)<GOAL_W){
          tx=ball.x;ty=ball.y;moveSpd=p.speed*1.3;
        }else{
          moveSpd=p.speed*0.8;
        }
      }
      // === TEAM HAS BALL — MAKE ATTACKING RUNS ===
      else if(myTeamHasBall){
        // Move forward into space, spread wide, make overlapping runs
        const attackY=hy+atkDir*(-PITCH.h*0.25); // push forward
        const spreadX=hx+(p.homeX<0.5?-1:1)*PITCH.w*0.08; // spread wider

        // Dynamic runs: time-based oscillation for off-ball movement
        const runPhase=Math.sin(frame*0.015+p.homeX*10)*PITCH.w*0.1;
        const runY=Math.sin(frame*0.01+p.homeY*8)*PITCH.h*0.06*atkDir;

        tx=spreadX+runPhase;
        ty=attackY+runY;

        // Forwards make deeper runs
        if(p.role==='fwd'){
          ty=hy+atkDir*(-PITCH.h*0.35);
          tx=hx+Math.sin(frame*0.02+p.homeX*5)*PITCH.w*0.15;
        }
        // Midfielders support play
        if(p.role==='mid'){
          // Move toward ball carrier to offer passing option
          if(ball.owner){
            const toBallOwner=dist(p,ball.owner);
            if(toBallOwner>150){
              tx=(tx+ball.owner.x)/2;
              ty=(ty+ball.owner.y)/2;
            }
          }
        }
        // Defenders hold but push up slightly
        if(p.role==='def'){
          ty=hy+atkDir*(-PITCH.h*0.1);
          tx=hx+Math.sin(frame*0.012+p.homeX*7)*PITCH.w*0.06;
        }
        moveSpd=p.speed*0.85;
      }
      // === ENEMY HAS BALL — PRESS AND DEFEND ===
      else if(enemyHasBall){
        // Closest player to ball chases aggressively
        const closestToBall=closest(team,ball);

        if(p===closestToBall||(ballDist<120&&p.role!=='gk')){
          // Chase the ball directly!
          tx=ball.x;ty=ball.y;
          moveSpd=p.speed*1.1;
        }else if(p.role==='def'){
          // Fall back between ball and own goal, but stay active
          tx=(hx+ball.x*0.3)/1.3;
          ty=(defGoalY*0.3+ball.y*0.3+hy*0.4);
          moveSpd=p.speed*0.9;
        }else if(p.role==='mid'){
          // Track back and cut passing lanes
          tx=(ball.x+hx)/2;
          ty=(ball.y+hy)/2;
          moveSpd=p.speed*0.9;
        }else if(p.role==='fwd'){
          // Stay forward but drift toward ball side
          tx=hx+(ball.x>FW/2?1:-1)*PITCH.w*0.08;
          ty=hy;
          moveSpd=p.speed*0.6;
        }
      }
      // === LOOSE BALL — EVERYONE CHASES ===
      else{
        // Multiple players chase the ball
        const closestToBall=closest(team,ball);
        if(p===closestToBall){
          tx=ball.x;ty=ball.y;
          moveSpd=p.speed*1.2; // Sprint to ball!
        }else{
          // Others move to supporting positions
          tx=(hx*0.5+ball.x*0.5);
          ty=(hy*0.5+ball.y*0.5);
          moveSpd=p.speed*0.8;
        }
      }

      // Clamp target to pitch
      tx=Math.max(PITCH.x+15,Math.min(PITCH.x+PITCH.w-15,tx));
      ty=Math.max(PITCH.y+15,Math.min(PITCH.y+PITCH.h-15,ty));

      // Move toward target
      const dx=tx-p.x,dy=ty-p.y;
      const d=Math.hypot(dx,dy)||1;
      if(d>5){
        p.vx=dx/d*moveSpd;p.vy=dy/d*moveSpd;
      }else{
        p.vx*=0.5;p.vy*=0.5;
        // Idle fidget — small movements so nobody stands still
        p.vx+=(Math.random()-0.5)*0.5;
        p.vy+=(Math.random()-0.5)*0.5;
      }

      // TACKLE — try to win the ball when close
      if(ball.owner&&ball.owner.team!==teamTag&&ballDist<p.radius+12&&p.kickCooldown===0){
        if(Math.random()<0.45){
          ball.owner.kickCooldown=15;
          ball.owner=null;ball.free=true;
          ball.vx=(Math.random()-0.5)*4;ball.vy=(Math.random()-0.5)*4;
          p.kickCooldown=12;
          emitP(p.x,p.y,'#ffffff',10,3,2);
          if(!isOpp)commentary(p.name+" wins the ball!");
          else commentary(opp.short+" tackles!");
        }
      }

      // Auto-pickup loose ball
      if(ball.free&&ballDist<p.radius+8&&p.kickCooldown===0){
        ball.owner=p;ball.free=false;
      }
    }

    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.82;p.vy*=0.82;
    clampToPitch(p);

    // Running particles (dust) when moving fast
    if(Math.hypot(p.vx,p.vy)>2&&frame%4===0){
      particles.push({x:p.x,y:p.y+6,vx:(Math.random()-0.5)*0.5,vy:Math.random()*0.3,life:0.5,color:'#88aa6644',size:2,decay:0.04});
    }
  });
}

function clampToPitch(p){
  p.x=Math.max(PITCH.x+p.radius,Math.min(PITCH.x+PITCH.w-p.radius,p.x));
  p.y=Math.max(PITCH.y-GOAL_DEPTH+p.radius,Math.min(PITCH.y+PITCH.h+GOAL_DEPTH-p.radius,p.y));
}

function updateBall(){
  if(ball.owner){
    // Ball follows owner
    const p=ball.owner;
    const ang=Math.atan2(p.vy,p.vx);
    const ahead=Math.hypot(p.vx,p.vy)>0.3?10:8;
    ball.x=p.x+Math.cos(ang)*ahead;
    ball.y=p.y+Math.sin(ang)*ahead;
    ball.vx=0;ball.vy=0;
  }else{
    ball.x+=ball.vx;ball.y+=ball.vy;
    ball.vx*=0.97;ball.vy*=0.97;

    // Ball height
    if(ball.z>0||ball.vz>0){
      ball.z+=ball.vz;ball.vz-=0.15;
      if(ball.z<=0){ball.z=0;ball.vz=0;}
    }

    // Bounce off pitch edges
    if(ball.x<PITCH.x+5){ball.x=PITCH.x+5;ball.vx=Math.abs(ball.vx)*0.5;}
    if(ball.x>PITCH.x+PITCH.w-5){ball.x=PITCH.x+PITCH.w-5;ball.vx=-Math.abs(ball.vx)*0.5;}

    // Top/bottom: check if in goal or out
    if(ball.y<PITCH.y-GOAL_DEPTH){ball.y=PITCH.y-GOAL_DEPTH;ball.vy=Math.abs(ball.vy)*0.3;}
    if(ball.y>PITCH.y+PITCH.h+GOAL_DEPTH){ball.y=PITCH.y+PITCH.h+GOAL_DEPTH;ball.vy=-Math.abs(ball.vy)*0.3;}

    // Goal kick if out top/bottom but not in goal
    if(ball.y<PITCH.y&&(ball.x<GOAL_TOP.x||ball.x>GOAL_TOP.x+GOAL_W)){
      ball.y=PITCH.y+5;ball.vy=2;ball.vx=0;
    }
    if(ball.y>PITCH.y+PITCH.h&&(ball.x<GOAL_BOT.x||ball.x>GOAL_BOT.x+GOAL_W)){
      ball.y=PITCH.y+PITCH.h-5;ball.vy=-2;ball.vx=0;
    }
  }
}

function checkGoals(){
  if(goalCooldown>0)return;
  // Kevin's team attacks bottom in half 1, top in half 2
  // Goal at top = opponent's goal in half 1
  const kevinGoal=half===1?GOAL_TOP:GOAL_BOT; // goal Kevin defends
  const oppGoal=half===1?GOAL_BOT:GOAL_TOP;   // goal Kevin attacks

  // Kevin scores (ball in opponent goal)
  if(ball.x>oppGoal.x+5&&ball.x<oppGoal.x+GOAL_W-5){
    if((half===1&&ball.y>PITCH.y+PITCH.h)||(half===2&&ball.y<PITCH.y)){
      scoreK++;sKE.textContent=scoreK;
      goalScored('kevin');return;
    }
  }
  // Opponent scores
  if(ball.x>kevinGoal.x+5&&ball.x<kevinGoal.x+GOAL_W-5){
    if((half===1&&ball.y<PITCH.y)||(half===2&&ball.y>PITCH.y+PITCH.h)){
      scoreO++;sOE.textContent=scoreO;
      goalScored('opp');return;
    }
  }
}

function goalScored(who){
  goalCooldown=120;
  ball.owner=null;ball.free=true;ball.vx=0;ball.vy=0;
  screenShake.i=15;
  const msgs_k=["GOOOAL! Kevin's team scores!","What a goal!","Into the net!","The crowd erupts!"];
  const msgs_o=["They score!","Goal conceded!","One slips through!"];

  if(who==='kevin'){
    commentary(msgs_k[Math.floor(Math.random()*msgs_k.length)]);
    announce('⚽ GOAL!','#44ffaa',1.3);
    emitP(ball.x,ball.y,'#ffdd00',40,6,4);emitP(ball.x,ball.y,'#00ff88',20,4,3);
    goalFlash.style.background='rgba(0,255,100,0.15)';goalFlash.style.opacity='1';
  }else{
    commentary(msgs_o[Math.floor(Math.random()*msgs_o.length)]);
    announce('⚽ GOAL!','#ff4444',1.2);
    emitP(ball.x,ball.y,'#ff4444',30,5,3);
    goalFlash.style.background='rgba(255,0,0,0.12)';goalFlash.style.opacity='1';
  }
  setTimeout(()=>goalFlash.style.opacity='0',600);
}

function endMatch(){
  running=false;
  resultMsg.style.display='block';
  if(scoreK>scoreO){
    if(matchIdx>=OPPONENTS.length-1){
      resultMsg.innerHTML=`🥇 OLYMPIC CHAMPION!<br>Kevin ${scoreK} — ${scoreO} ${OPPONENTS[matchIdx].name}<br>👑 Gold Medal!`;
      matchIdx=0;startBtn.textContent='NEW TOURNAMENT';
    }else{
      resultMsg.innerHTML=`🏆 KEVIN WINS!<br>${scoreK} — ${scoreO}`;
      matchIdx++;startBtn.textContent='NEXT MATCH';
    }
  }else if(scoreK===scoreO){
    resultMsg.innerHTML=`⚡ DRAW!<br>${scoreK} — ${scoreO}<br>Extra time!`;
    startBtn.textContent='EXTRA TIME';
  }else{
    resultMsg.innerHTML=`😤 DEFEATED<br>${scoreK} — ${scoreO}`;
    startBtn.textContent='RETRY';
  }
  setTimeout(()=>overlay.classList.remove('hidden'),1000);
}

// ======== DRAW ========
function draw(){
  X.save();X.translate(screenShake.x,screenShake.y);

  // Background
  X.fillStyle='#1a3a1a';X.fillRect(0,0,FW,FH);

  drawPitch();
  drawGoals();
  drawPlayers();
  drawBall();
  drawParticles();
  drawAnnouncements();
  drawMinimap();
  drawTouchControls();

  X.restore();
}

function drawPitch(){
  // Grass
  const gg=X.createLinearGradient(0,PITCH.y,0,PITCH.y+PITCH.h);
  gg.addColorStop(0,'#1d7a1d');gg.addColorStop(0.5,'#228b22');gg.addColorStop(1,'#1d7a1d');
  X.fillStyle=gg;X.fillRect(PITCH.x,PITCH.y,PITCH.w,PITCH.h);

  // Grass stripes
  const stripeW=PITCH.w/12;
  for(let i=0;i<12;i++){
    if(i%2===0){X.fillStyle='rgba(255,255,255,0.015)';X.fillRect(PITCH.x+i*stripeW,PITCH.y,stripeW,PITCH.h);}
  }

  // Lines
  X.strokeStyle='rgba(255,255,255,0.35)';X.lineWidth=2;
  X.strokeRect(PITCH.x,PITCH.y,PITCH.w,PITCH.h);

  // Center line
  X.beginPath();X.moveTo(PITCH.x,PITCH.y+PITCH.h/2);X.lineTo(PITCH.x+PITCH.w,PITCH.y+PITCH.h/2);X.stroke();

  // Center circle
  X.beginPath();X.arc(FW/2,PITCH.y+PITCH.h/2,50,0,Math.PI*2);X.stroke();
  X.fillStyle='rgba(255,255,255,0.3)';X.beginPath();X.arc(FW/2,PITCH.y+PITCH.h/2,3,0,Math.PI*2);X.fill();

  // Penalty areas
  const paW=200,paH=70;
  X.strokeRect(PITCH.x+PITCH.w/2-paW/2,PITCH.y,paW,paH);
  X.strokeRect(PITCH.x+PITCH.w/2-paW/2,PITCH.y+PITCH.h-paH,paW,paH);

  // Goal areas
  const gaW=100,gaH=30;
  X.strokeRect(PITCH.x+PITCH.w/2-gaW/2,PITCH.y,gaW,gaH);
  X.strokeRect(PITCH.x+PITCH.w/2-gaW/2,PITCH.y+PITCH.h-gaH,gaW,gaH);

  // Penalty spots
  X.fillStyle='rgba(255,255,255,0.3)';
  X.beginPath();X.arc(FW/2,PITCH.y+55,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(FW/2,PITCH.y+PITCH.h-55,2,0,Math.PI*2);X.fill();
}

function drawGoals(){
  // Top goal
  X.fillStyle='rgba(255,255,255,0.08)';
  X.fillRect(GOAL_TOP.x,GOAL_TOP.y,GOAL_W,GOAL_TOP.h);
  X.strokeStyle='#ffffff88';X.lineWidth=3;
  X.strokeRect(GOAL_TOP.x,PITCH.y,GOAL_W,1);
  X.lineWidth=2;
  X.beginPath();X.moveTo(GOAL_TOP.x,PITCH.y);X.lineTo(GOAL_TOP.x,GOAL_TOP.y);X.stroke();
  X.beginPath();X.moveTo(GOAL_TOP.x+GOAL_W,PITCH.y);X.lineTo(GOAL_TOP.x+GOAL_W,GOAL_TOP.y);X.stroke();
  X.beginPath();X.moveTo(GOAL_TOP.x,GOAL_TOP.y);X.lineTo(GOAL_TOP.x+GOAL_W,GOAL_TOP.y);X.stroke();

  // Net lines top
  X.strokeStyle='rgba(255,255,255,0.06)';X.lineWidth=0.5;
  for(let i=GOAL_TOP.x;i<GOAL_TOP.x+GOAL_W;i+=8){X.beginPath();X.moveTo(i,GOAL_TOP.y);X.lineTo(i,PITCH.y);X.stroke();}

  // Bottom goal
  X.fillStyle='rgba(255,255,255,0.08)';
  X.fillRect(GOAL_BOT.x,PITCH.y+PITCH.h,GOAL_W,GOAL_DEPTH);
  X.strokeStyle='#ffffff88';X.lineWidth=3;
  X.strokeRect(GOAL_BOT.x,PITCH.y+PITCH.h-1,GOAL_W,1);
  X.lineWidth=2;
  X.beginPath();X.moveTo(GOAL_BOT.x,PITCH.y+PITCH.h);X.lineTo(GOAL_BOT.x,PITCH.y+PITCH.h+GOAL_DEPTH);X.stroke();
  X.beginPath();X.moveTo(GOAL_BOT.x+GOAL_W,PITCH.y+PITCH.h);X.lineTo(GOAL_BOT.x+GOAL_W,PITCH.y+PITCH.h+GOAL_DEPTH);X.stroke();
  X.beginPath();X.moveTo(GOAL_BOT.x,PITCH.y+PITCH.h+GOAL_DEPTH);X.lineTo(GOAL_BOT.x+GOAL_W,PITCH.y+PITCH.h+GOAL_DEPTH);X.stroke();

  X.strokeStyle='rgba(255,255,255,0.06)';X.lineWidth=0.5;
  for(let i=GOAL_BOT.x;i<GOAL_BOT.x+GOAL_W;i+=8){X.beginPath();X.moveTo(i,PITCH.y+PITCH.h);X.lineTo(i,PITCH.y+PITCH.h+GOAL_DEPTH);X.stroke();}
}

function drawPlayers(){
  // Draw all players sorted by Y for overlap
  const all=allPlayers().sort((a,b)=>a.y-b.y);
  all.forEach(p=>{
    const isCtrl=p===controlled;
    const hasBall=ball.owner===p;
    const isK=p.team==='k';
    const opp=OPPONENTS[matchIdx];

    X.save();X.translate(p.x,p.y);

    // Selection ring
    if(isCtrl){
      X.strokeStyle='#ffdd00';X.lineWidth=2;
      X.beginPath();X.arc(0,0,p.radius+5+Math.sin(frame*0.1)*2,0,Math.PI*2);X.stroke();
      // Arrow above
      X.fillStyle='#ffdd00';
      X.beginPath();X.moveTo(0,-p.radius-12);X.lineTo(-4,-p.radius-18);X.lineTo(4,-p.radius-18);X.fill();
    }

    // Shadow
    X.fillStyle='rgba(0,0,0,0.2)';
    X.beginPath();X.ellipse(0,p.radius-2,p.radius,3,0,0,Math.PI*2);X.fill();

    // Body
    X.fillStyle=isK?'#3388ff':(opp.color||'#ff4444');
    X.shadowColor=isK?'#0066ff':'#ff0000';X.shadowBlur=hasBall?10:3;
    X.beginPath();X.arc(0,0,p.radius,0,Math.PI*2);X.fill();
    X.shadowBlur=0;

    // Outline
    X.strokeStyle=isK?'#2266cc':'#cc2222';X.lineWidth=1.5;
    X.beginPath();X.arc(0,0,p.radius,0,Math.PI*2);X.stroke();

    // Number
    X.font="bold 9px 'Anybody',sans-serif";X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#fff';X.fillText(p.number,0,0);

    // Name for Kevin
    if(p.isKevin||isCtrl){
      X.font="bold 8px 'Bungee',sans-serif";X.fillStyle=isCtrl?'#ffdd00':'#fff';
      X.fillText(p.name,0,-p.radius-6);
    }

    X.restore();
  });
}

function drawBall(){
  const bz=ball.z||0;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.15)';
  X.beginPath();X.ellipse(ball.x,ball.y+2,6,2.5,0,0,Math.PI*2);X.fill();

  X.save();X.translate(ball.x,ball.y-bz);
  const s=1+bz*0.01;X.scale(s,s);

  const bg=X.createRadialGradient(-1,-1,0,0,0,6);
  bg.addColorStop(0,'#fff');bg.addColorStop(0.6,'#eee');bg.addColorStop(1,'#bbb');
  X.beginPath();X.arc(0,0,6,0,Math.PI*2);X.fillStyle=bg;X.fill();

  // Pentagons
  X.fillStyle='#444';
  for(let i=0;i<5;i++){
    const a=Math.PI*2*i/5+frame*0.04;
    X.beginPath();X.arc(Math.cos(a)*3,Math.sin(a)*3,1.5,0,Math.PI*2);X.fill();
  }

  X.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    X.globalAlpha=Math.max(0,p.life);
    X.beginPath();X.arc(p.x,p.y,Math.max(0.5,p.size*p.life),0,Math.PI*2);
    X.fillStyle=p.color;X.fill();
  });X.globalAlpha=1;
}

function drawAnnouncements(){
  announcements.forEach(a=>{
    X.save();X.globalAlpha=Math.min(1,a.alpha);
    X.font=`bold ${Math.round(26*a.scale)}px 'Bungee',sans-serif`;
    X.textAlign='center';X.textBaseline='middle';
    X.strokeStyle='#000';X.lineWidth=4;X.strokeText(a.text,FW/2,a.y);
    X.fillStyle=a.color;X.shadowColor=a.color;X.shadowBlur=12;
    X.fillText(a.text,FW/2,a.y);X.restore();
  });
}

function drawMinimap(){
  const mw=80,mh=55,mx=FW-mw-8,my=FH-mh-18;
  X.fillStyle='rgba(0,40,0,0.6)';X.fillRect(mx,my,mw,mh);
  X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=1;X.strokeRect(mx,my,mw,mh);

  const sx=(x)=>mx+(x-PITCH.x)/PITCH.w*mw;
  const sy=(y)=>my+(y-PITCH.y)/PITCH.h*mh;

  teamK.forEach(p=>{X.fillStyle=p===controlled?'#ffdd00':'#4488ff';X.fillRect(sx(p.x)-1,sy(p.y)-1,3,3);});
  teamO.forEach(p=>{X.fillStyle='#ff4444';X.fillRect(sx(p.x)-1,sy(p.y)-1,3,3);});
  X.fillStyle='#fff';X.fillRect(sx(ball.x)-1.5,sy(ball.y)-1.5,3,3);
}

function drawTouchControls(){
  // Only draw if touch has been used
  if(!touchJoy._ever)return;
  const jx=70,jy=FH-70,jr=35;
  X.globalAlpha=0.2;
  X.strokeStyle='#fff';X.lineWidth=2;
  X.beginPath();X.arc(jx,jy,jr,0,Math.PI*2);X.stroke();
  if(touchJoy.active){
    X.fillStyle='#fff';
    X.beginPath();X.arc(jx+touchJoy.dx*jr*0.7,jy+touchJoy.dy*jr*0.7,10,0,Math.PI*2);X.fill();
  }

  // Buttons
  const bx=FW-60;
  ['Z Pass','X Shoot','C Switch'].forEach((label,i)=>{
    const by=FH-40-i*35;
    X.fillStyle='rgba(255,255,255,0.08)';
    X.beginPath();X.arc(bx,by,14,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(255,255,255,0.2)';X.beginPath();X.arc(bx,by,14,0,Math.PI*2);X.stroke();
    X.fillStyle='rgba(255,255,255,0.4)';X.font="7px 'Anybody',sans-serif";X.textAlign='center';X.textBaseline='middle';
    X.fillText(label.split(' ')[1],bx,by);
  });
  X.globalAlpha=1;
}

// ======== LOOP ========
function loop(){update();draw();requestAnimationFrame(loop);}

// ======== CONTROLS ========
document.addEventListener('keydown',e=>{
  keys_[e.key.toLowerCase()]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault();
});
document.addEventListener('keyup',e=>keys_[e.key.toLowerCase()]=false);

// Touch
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  touchJoy._ever=true;
  for(const t of e.changedTouches){
    const r=C.getBoundingClientRect();
    const tx=(t.clientX-r.left)/r.width*FW;
    const ty=(t.clientY-r.top)/r.height*FH;
    if(tx<FW/3){
      // Joystick
      touchJoy.active=true;touchJoy.sx=tx;touchJoy.sy=ty;touchJoy.dx=0;touchJoy.dy=0;
      touchJoy._id=t.identifier;
    }else if(tx>FW*2/3){
      // Buttons
      if(ty>FH-55)touchBtns.pass=true;
      else if(ty>FH-90)touchBtns.shoot=true;
      else touchBtns.switchP=true;
    }else{
      // Middle = sprint
      touchBtns.sprint=true;
    }
  }
});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touchJoy._id&&touchJoy.active){
      const r=C.getBoundingClientRect();
      const tx=(t.clientX-r.left)/r.width*FW;
      const ty=(t.clientY-r.top)/r.height*FH;
      const dx=tx-touchJoy.sx,dy=ty-touchJoy.sy;
      const d=Math.hypot(dx,dy)||1;
      const clamp=Math.min(d,35)/35;
      touchJoy.dx=dx/d*clamp;touchJoy.dy=dy/d*clamp;
    }
  }
});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touchJoy._id){touchJoy.active=false;touchJoy.dx=0;touchJoy.dy=0;}
  }
  touchBtns.sprint=false;
});

startBtn.addEventListener('click',()=>{
  initMatch();running=true;
  overlay.classList.add('hidden');resultMsg.style.display='none';
  commentary("Kick off! The match begins!");
  announce('KICK OFF!','#44ffaa',1);
});

initMatch();loop();
</script>
